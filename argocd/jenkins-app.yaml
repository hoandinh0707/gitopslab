apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/hoandinh0707/gitopslab.git
    targetRevision: main
    path: jenkins

  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true