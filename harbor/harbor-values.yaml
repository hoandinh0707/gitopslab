expose:
  type: nodePort
  tls:
    enabled: false

externalURL: http://harbor.local

harborAdminPassword: Harbor12345

persistence:
  persistentVolumeClaim:
    registry:
      storageClass: local-path
      size: 50Gi
    database:
      storageClass: local-path
      size: 10Gi
    redis:
      storageClass: local-path
      size: 5Gi
    jobservice:
      storageClass: local-path
      size: 5Gi
    trivy:
      storageClass: local-path
      size: 5Gi